<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../CSS/style.css">
    <title>Our Playlist</title>
</head>
<body>
    <div class="container">
        <h1 class="main-header">POKÉMUSIC</h1>
        <p>"Without music, life would be a mistake"</p>
        
        <div class="jukebox-grid" id="jukebox-container"></div>

            <div id="player-controls" class="player-hidden">
            <button id="close-player" onclick="togglePlayer()"></button>
            
            <div class="player-content">
                <div class="song-info">
                    <img id="player-pkmn" src="" alt="pkmn">
                    <div>
                        <h4 id="player-title">Música</h4>
                        <p id="player-artist">Artista</p>
                    </div>
                </div>
                
                <div class="audio-buttons">
                    <button onclick="prevMusic()" class="player-btns">⏮</button>
                    <button id="play-pause-btn" onclick="togglePlay()" class="player-btns">⏸</button>
                    <button onclick="nextMusic()" class="player-btns">⏭</button>
                </div>

                <div class="playback-bar">
                    <span id="current-time">0:00</span>
                    <input type="range" id="progress-range" value="0" step="1">
                    <span id="total-duration">0:00</span>
                </div>
            </div>
        </div>        
        <a href="../index.html" class="pkmn-link">BACK</a>
    </div>

    <script src="../JS/script.js"></script>
</body>
</html>
