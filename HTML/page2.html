<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../CSS/style.css"> 
    <title>Pokémemories</title>
</head>
<body>
    <div class="pokedex-body">
        <div class="pokedex-screen">
            <div class="container-pokedex">
                <h1 class="main-header" style="color: #D6A2E8; font-size: 7rem;">POKÉMEMORIES</h1>
                
              <div class="trainer-info" style="display: flex; align-items: center; justify-content: center; gap: 120px; margin-top: 50px;">
    
                        <div style="position: relative; width: 380px; height: 380px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                            
                            <img src="../assets/fairyantonia.jpeg" 
                                style="width: 180px; height: 180px; border-radius: 50%; object-fit: cover; z-index: 1; position: absolute; border: 4px solid #333; box-shadow: 0 0 15px rgba(0,0,0,0.5);">
                            
                            <div style="position: absolute; width: 100%; height: 100%; 
                                        background-image: url('https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/uikit/themed-borders/theme-9-border.png');
                                        background-size: contain; background-repeat: no-repeat; background-position: center; 
                                        z-index: 2; pointer-events: none; 
                                        filter: drop-shadow(0 0 25px rgba(255, 105, 180, 0.9));"> </div>
                        </div>

                        <div class="stats-box" style="text-align: left; line-height: 2.2; font-size: 1.5rem; min-width: 350px;">
                            <p style="margin: 15px 0;"><strong>NAME:</strong> Antonia</p>
                            <p style="margin: 15px 0;"><strong>TYPE:</strong> <img src="../assets/fairytype.gif" style="height: 35px; vertical-align: middle;" /></p>
                            <p style="margin: 15px 0;"><strong>LEVEL:</strong> 19 (LEVEL UP !)</p>
                            <p style="margin: 15px 0;"><strong>HP:</strong> <span style="color: #4ECDC4;">████████ 100%</span></p>
                        </div>
                    </div>

                <hr class="pkmn-hr" style="margin: 15px 0; border: 1px solid #D6A2E8;">

                <div class="message-container" id="deck-conteudo"></div>

                <a href="../index.html" class="pkmn-link-wide" style="margin-top: 20px; display: inline-block;">BACK</a>
            </div>
        </div>
    </div>

    <script src="../JS/script.js"></script>
</body>
</html>
